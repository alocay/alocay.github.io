<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Armando Locay.</title>
    <script>
      // Encode the path as a query param and redirect to index.html.
      // The index.html script restores it via history.replaceState before React boots.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
